name: CI

on:
  push:
    branches: ["**"]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  NEXT_TELEMETRY_DISABLED: "1"

jobs:
  quality:
    name: Quality (lint, types, build)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

  smoke:
    name: Smoke (prod server routes)
    runs-on: ubuntu-latest
    needs: quality
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build app
        run: npm run build

      - name: Start app
        run: |
          PORT=3100 npm run start > /tmp/easy-grocer-start.log 2>&1 &
          for i in $(seq 1 30); do
            if curl -fsS "http://127.0.0.1:3100/login" > /dev/null; then
              exit 0
            fi
            sleep 1
          done
          echo "Server failed to start"
          cat /tmp/easy-grocer-start.log
          exit 1

      - name: Verify protected route redirects
        run: |
          login_code=$(curl -s -o /dev/null -w "%{http_code}" "http://127.0.0.1:3100/login")
          dashboard_html=$(curl -s "http://127.0.0.1:3100/dashboard")
          cart_html=$(curl -s "http://127.0.0.1:3100/cart")

          test "$login_code" = "200"
          echo "$dashboard_html" | grep -Eq "__next-page-redirect|NEXT_REDIRECT;replace;/login|url=/login"
          echo "$cart_html" | grep -Eq "__next-page-redirect|NEXT_REDIRECT;replace;/login|url=/login"

      - name: Verify callback sanitizes next URL
        run: |
          callback_location=$(curl -s -I "http://127.0.0.1:3100/auth/callback?next=https://evil.example" | awk 'BEGIN{IGNORECASE=1}/^location:/{print $2}' | tr -d '\r')
          echo "$callback_location" | grep -q "/login"
          ! echo "$callback_location" | grep -q "evil.example"

  security:
    name: Security (deps and PR review)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: npm audit (prod deps)
        run: npm audit --omit=dev

      - name: Dependency review (PR only)
        if: github.event_name == 'pull_request'
        uses: actions/dependency-review-action@v4

  db-schema-guard:
    name: DB schema guard (migration shape)
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Validate migration naming and ordering
        run: |
          node <<'EOF'
          const fs = require("fs");
          const path = "supabase/migrations";
          const files = fs
            .readdirSync(path)
            .filter((f) => f.endsWith(".sql"))
            .sort();
          if (files.length === 0) {
            throw new Error("No SQL migrations found in supabase/migrations.");
          }
          const bad = files.filter((f) => !/^\d+_[a-z0-9_]+\.sql$/.test(f));
          if (bad.length > 0) {
            throw new Error(`Invalid migration filename(s): ${bad.join(", ")}`);
          }
          const prefixes = files.map((f) => f.split("_")[0]);
          const unique = new Set(prefixes);
          if (unique.size !== prefixes.length) {
            throw new Error("Duplicate migration numeric prefixes detected.");
          }
          console.log("Migrations look valid:", files.join(", "));
          EOF
